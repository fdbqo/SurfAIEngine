# Vercel Hobby only lets me have 1 native cron/day. This is a problem which is why this action flow is used. This workflow runs hourly on GitHub's clock
# and hits deployed /api/cron/notify

name: Cron notify (hourly)
on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:
jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Require secrets
        env:
          VERCEL_APP_URL: ${{ secrets.VERCEL_APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$VERCEL_APP_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "::error::Add repository secrets VERCEL_APP_URL and CRON_SECRET (GitHub → repo → Settings → Secrets and variables → Actions)."
            exit 1
          fi
      - name: GET /api/cron/notify
        env:
          VERCEL_APP_URL: ${{ secrets.VERCEL_APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          BASE="${VERCEL_APP_URL%/}"
          curl -sS -f \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${BASE}/api/cron/notify"
